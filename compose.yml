services:
  db:
    image: postgres:17-alpine
    container_name: ekloges-elme-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ekloges_elme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
